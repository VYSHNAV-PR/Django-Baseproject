<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            background: linear-gradient(90deg, rgba(42, 123, 155, 1) 0%, rgba(87, 199, 133, 1) 50%, rgba(237, 221, 83, 1) 100%);
            font-weight: bold;
        }

        .form-control {
            margin-left: 250px;
            margin-right: 250px;
            margin-top: 150px;
            width: 30%;
            height: auto;
            border: 5px solid whitesmoke;
            background-color: transparent;

        }

        .form {

            background-color: whitesmoke;
            border: 10px;
        }

        .password1 {
            background-color: green;
        }

        button {
            background-color: rgb(77, 172, 240);
            font-size: 15px;
            border-radius: 5px;
            width: 90px;
        }

        button a {
            text-decoration: none;
            color: rgb(17, 5, 5);
        }
        button:hover{
            background-color: aquamarine;
        }
        .login-one{
            display:inline;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<center>

    <body>
        <div class="form-control">
            <form method="POST">
                {%csrf_token%}
                {{form.as_p}}
                <center>
                    <div class="login-one">
                        <!-- <p style="color: rgb(34, 34, 35);">Don't Have an Account?</p> -->
                        <button><a href="{% url 'register'%}">Register</a></button>
                    </div>
                    <button><a href="{% url 'home'%}">Login</a></button>
                </center>
            </form>
        </div>
    </body>
</center>

</html>
